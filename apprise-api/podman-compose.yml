# Apprise API - Podman Compose Configuration
# Usage: podman-compose -f podman-compose.yml up -d

version: '3'

services:
  apprise-api:
    # Official Apprise API Docker image from Docker Hub
    image: docker.io/caronc/apprise:latest

    # Container name
    container_name: apprise-api

    # Restart policy
    restart: always

    # Port mappings
    ports:
      - "8000:8000"

    # Volume mounts
    volumes:
      # Persistent storage for configuration, plugins, and attachments
      - /var/lib/apprise/config:/config
      - /var/lib/apprise/plugin:/plugin
      - /var/lib/apprise/attach:/attach

    # Environment variables
    environment:
      APPRISE_STORAGE_DIR: "/config"
      APPRISE_STORAGE_MODE: "auto"
      APPRISE_STATEFUL_MODE: "simple"
      APPRISE_WORKER_COUNT: "1"
      APPRISE_ADMIN: "y"
      APPRISE_INTERPRET_EMOJIS: "yes"

    # Logging
    logging:
      driver: journald
      options:
        tag: "apprise-api"

    # Resource limits (adjust for Raspberry Pi)
    mem_limit: 512m
    memswap_limit: 512m
    cpus: '1.0'

    # Capabilities and security
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    read_only: true

    # Ephemeral writable storage required at runtime
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
      - /run:rw,noexec,nosuid,nodev,size=16m

    # Healthcheck
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # Network
    networks:
      - apprise-net

networks:
  apprise-net:
    driver: bridge

# Optional: Define volumes if using named volumes instead of host paths
# volumes:
#   apprise-data:
#     driver: local
